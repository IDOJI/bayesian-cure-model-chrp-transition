<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>최신 보고서로 이동 중...</title>
</head>
<body>
  <p>최신 보고서로 이동 중...</p>

  <script>
    const owner = "IDOJI";
    const repo = "bayesian-cure-model-chrp-transition";
    const branch = "main";
    const folder = "2.Reports HTML";

    const apiFolderPath = folder.split("/").map(encodeURIComponent).join("/");
    const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${apiFolderPath}?ref=${encodeURIComponent(branch)}`;
    const pagesBase = `https://${owner.toLowerCase()}.github.io/${repo}/`;

    function encodePath(path) {
      return path.split("/").map(encodeURIComponent).join("/");
    }

    function getDateValue(filename) {
      const m = filename.match(/(\d{2,4})년도\s*(\d{1,2})월\s*(\d{1,2})일/);
      if (!m) return -1;

      let year = Number(m[1]);
      if (year < 100) year += 2000;

      const month = Number(m[2]);
      const day = Number(m[3]);

      return new Date(year, month - 1, day).getTime();
    }

    async function redirectToLatestReport() {
      try {
        const response = await fetch(apiUrl, {
          headers: { "Accept": "application/vnd.github+json" }
        });

        if (!response.ok) {
          throw new Error(`API 요청 실패: ${response.status}`);
        }

        const items = await response.json();

        const htmlFiles = items.filter(
          item => item.type === "file" && item.name.toLowerCase().endsWith(".html")
        );

        if (htmlFiles.length === 0) {
          throw new Error("HTML 파일이 없습니다.");
        }

        htmlFiles.sort((a, b) => {
          const da = getDateValue(a.name);
          const db = getDateValue(b.name);

          if (da !== db) return db - da;
          return b.name.localeCompare(a.name, "ko");
        });

        const latestUrl = pagesBase + encodePath(htmlFiles[0].path);
        window.location.replace(latestUrl);
      } catch (error) {
        document.body.innerHTML = `<p>최신 보고서를 찾지 못했습니다: ${error.message}</p>`;
      }
    }

    redirectToLatestReport();
  </script>
</body>
</html>
